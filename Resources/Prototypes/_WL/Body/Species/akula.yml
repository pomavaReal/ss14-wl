- type: entity
  save: false
  name: Urist McFish
  parent:
  - AppearanceAkula
  - BaseSpeciesMobOrganic
  id: MobAkula
  components: # TODO: Give species uniq features
    - type: Body
      prototype: Akula
      requiredLegs: 2
    - type: Hunger
    - type: Icon
      sprite: _WL/Mobs/Species/Akula/parts.rsi
      state: full
    - type: Thirst
    - type: Perishable
    - type: MeleeWeapon
      soundHit:
        collection: Punch
      animation: WeaponArcClaw
    - type: Butcherable
      butcheringType: Spike
      spawned:
        - id: FoodMeatHuman
          amount: 5
    - type: Vocal
      sounds:
        Male: MaleAkula
        Female: FemaleAkula
        Unsexed: MaleAkula
    - type: Wagging
    - type: Languages
      speaking:
        - Translate
      understood:
        - Translate
      specieLanguage: Sarengis

