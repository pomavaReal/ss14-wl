- type: entity
  name: Urist MacCischi
  parent:
  - AppearanceCischi
  - BaseSpeciesMobOrganic
  id: MobCischi
  components:
  - type: Hunger
  - type: Thirst
  - type: Damageable
    damageModifierSet: Cischi
  - type: Inventory
    templateId: cischi
    speciesId: reptilian
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Corvax/Mobs/Species/displacement.rsi
            state: jumpsuit-female
      shoes:
        sizeMaps:
          32:
            sprite: Corvax/Mobs/Species/displacement.rsi
            state: shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Corvax/Mobs/Species/displacement.rsi
            state: jumpsuit
      shoes:
        sizeMaps:
          32:
            sprite: Corvax/Mobs/Species/displacement.rsi
            state: shoes
  - type: Bloodstream
    bloodReferenceSolution:
        reagents:
        - ReagentId: Cryoxadone
          Quantity: 300
    bloodlossDamage:
      types:
        Bloodloss:
          1.0
    bloodlossHealDamage:
      types:
        Bloodloss:
          -1.0
  - type: SolutionRegeneration
    solution: chemicals
    generated:
      reagents:
      - ReagentId: Cryoxadone
        Quantity: 0.1
  - type: Temperature
    currentTemperature: 283.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 295.15
    coldDamageThreshold: 233.15
    coldDamage:
      types:
        Cold: 0.1
    heatDamage:
      types:
        Heat: 1.5
  - type: ThermalRegulator
    metabolismHeat:  800
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 283.15
    thermalRegulationTemperatureThreshold: 5
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.3
  - type: Respirator
    damage:
      types:
        Asphyxiation: 2.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: Body
    prototype: Cischi
    requiredLegs: 2
  - type: PointLight
    energy: 1
    radius: 2
    color: "#10ad83"
  - type: CischiAccent
  - type: ReplacementAccent
    accent: cischi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: BareFootCischi
      params:
        variation: 0.2
        volume: -14
  - type: NoSlip
  - type: Languages
    speaking:
      - Translate
    understood:
      - Translate

