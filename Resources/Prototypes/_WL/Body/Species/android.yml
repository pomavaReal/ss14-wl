- type: entity
  name: Urist McAndroid
  parent:
  - AppearanceAndriod
  - MobBloodstream
  - MobRespirator
  - MobAtmosStandard
  - MobFlammable
  - BaseSpeciesMob
  id: MobAndroid
  components:
  - type: ZombieImmune
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.50 #per second, scales with pressure and other constants.
        Heat: 0.1
  - type: HealthExaminable
    examinableTypes:
      - Blunt
      - Slash
      - Piercing
      - Heat
      - Shock
      - Cold
      - Caustic
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Ritium
        Quantity: 300
    bloodlossDamage:
      types:
        Bloodloss:
          1.05
    bloodlossHealDamage:
      types:
        Bloodloss:
          -1.05
    maxBleedAmount: 1.0
    bloodRefreshAmount: 0.0
    bleedReductionAmount: 0.0
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
      Acidic: [Touch, Ingestion]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [Touch, Ingestion, Injection]
      effects:
      - !type:Electrocute
        probability: 0.05
      - !type:PopupMessage
        type: Local
        visualType: LargeCaution
        messages: [ "android-hurt-water-popup" ]
        probability: 0.25
  - type: StatusEffects
    allowed:
      - Stun
      - KnockedDown
      - ForcedSleep
      - SlowedDown
      - Stutter
      - Electrocution
      - SlurredSpeech
      - RatvarianLanguage
      - PressureImmunity
      - Muted
      - Pacified
      - StaminaModifier
      - TemporaryBlindness
      - Flashed
  - type: Blindable
  - type: EyeProtection
  - type: FlashImmunity
  - type: Icon
    sprite: _WL/Mobs/Species/Android/parts.rsi
    state: full
  - type: Sprite
    sprite: _WL/Mobs/Species/Android/parts.rsi
  - type: GenericVisualizer
    visuals:
      enum.AndroidLightVisuals.Enabled:
        AndroidSensors-sensors:
          True: { shader: unshaded }
          False: { shader: shaded }
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42 #42
  - type: TemperatureDamage
    heatDamageThreshold: 460
    coldDamageThreshold: 270.3 #293.3 предел
    coldDamage:
      types:
        Cold: 0.2 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 0.1 #per second, scales with temperature & other constants
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 310.15
    thermalRegulationTemperatureThreshold: 25
  - type: Body
    prototype: Android
    requiredLegs: 2
  - type: Damageable
    damageContainer: BioRobotic
    damageModifierSet: BioRobotic
  - type: Vocal
    sounds:
      Male: MaleAndroid
      Female: FemaleAndroid
      Unsexed: MaleAndroid
  - type: Emoting
  - type: BodyEmotes
    soundsId: GeneralBodyEmotes
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTypeTrigger
          damageType: Blunt
          damage: 600
        behaviors:
          - !type:GibBehavior { }
  - type: SlowOnDamage
    speedModifierThresholds:
      0: 0.6
      60: 0.4
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#1d5386"
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: MetalThud
    angle: 30
    animation: WeaponArcFist
    attackRate: 1
    damage:
      types:
        Blunt: 10
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: SheetPlastic
        amount: 5
  - type: Repairable
    damage:
      types:
        Blunt: -10
        Slash: -10
        Piercing: -10
        Heat: -10
        Shock: -10
        Caustic: -10
        Asphyxiation: -10
        Bloodloss: -10
        Radiation: -10
    fuelCost: 5
    bleedAmountReduce: -100
    doAfterDelay: 3
  - type: Speech
    speechSounds: Pai
  - type: TypingIndicator
    proto: robot
  - type: MobPrice
    price: 6000 # Android biocomponents are appreciated in the market...
    deathPenalty: 1000
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: PowerCellDraw
    drawRate: 0.5
  - type: LockedWiresPanel
  - type: WiresPanel
  - type: Android
  - type: BorgChassis
    maxModules: 0
    hasMindState: light
    noMindState: light
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        disableEject: true
        locked: false
        insertOnInteract: true
  - type: InteractionPopup
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: ItemToggle
    activated: true
    onUse: false
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot { }
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: FireVisuals
    normalState: human_small_fire # Corvax WL /tg/ resprite
    alternateState: human_big_fire # Corvax WL /tg/ resprite
  - type: Tag
    tags:
    - AndroidBodyTag
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
  - type: Languages
    speaking:
      - Translate
    understood:
      - Translate
    specieLanguage: Ternary
  - type: MobCollision # WL-Changes: MobCollision works for players only
  - type: OfferItem # CorvaxGoob-Offer

