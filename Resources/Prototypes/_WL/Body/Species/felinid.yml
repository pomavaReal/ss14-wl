- type: markingsGroup
  parent: Undergarments
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      onlyGroupWhitelisted: true
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ CatEars ]
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ CatTail ]
    enum.HumanoidVisualLayers.LArm:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.UndergarmentTop:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentTopTanktopVulpkanin ]
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentBottomBoxersVulpkanin ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  name: felinid appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganFelinidTorso
      Head: OrganFelinidHead
      ArmLeft: OrganFelinidArmLeft
      ArmRight: OrganFelinidArmRight
      HandRight: OrganFelinidHandRight
      HandLeft: OrganFelinidHandLeft
      LegLeft: OrganFelinidLegLeft
      LegRight: OrganFelinidLegRight
      FootLeft: OrganFelinidFootLeft
      FootRight: OrganFelinidFootRight
      Brain: OrganFelinidBrain
      Eyes: OrganFelinidEyes
      Tongue: OrganFelinidTongue
      Appendix: OrganFelinidAppendix
      Ears: OrganFelinidEars
      Lungs: OrganFelinidLungs
      Heart: OrganFelinidHeart
      Stomach: OrganFelinidStomach
      Liver: OrganFelinidLiver
      Kidneys: OrganFelinidKidneys
  - type: HumanoidProfile
    species: Felinid

- type: entity
  save: false
  name: Urist MacFelinid
  parent:
  - AppearanceFelinid
  - MobHuman
  - BaseSpeciesMobOrganic
  id: MobFelinid
  abstract: true
  components:
  - type: Vocal
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: Body
    prototype: Felinid
#  - type: Damageable
#    damageContainer: Biological
#    damageModifierSet: Felinid
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 1
        Slash: 5
  # - type: Thieving
  #   stealthy: true
  #  stripTimeReduction: 2.5
  - type: Speech
    speechSounds: Alto
    allowedEmotes: ['Purr']
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Stamina
    baseCritThreshold: 60
  - type: Perishable
  # - type: CanEscapeInventory
  #   baseResistTime: 1
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: Input
    context: "human"
  - type: OwOAccent
  # - type: Item
  - type: Icon
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: AddHeightItem
  - type: Languages
    speaking:
      - Translate
    understood:
      - Translate
    specieLanguage: OldEarth
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female

- type: entity
  parent: OrganBase
  id: OrganFelinid
  abstract: true
  suffix: felinid

- type: entity
  id: OrganFelinidMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  parent: OrganFelinid
  id: OrganFelinidInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  id: OrganFelinidVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganFelinid, OrganFelinidVisual ]
  id: OrganFelinidExternal
  abstract: true
  components:
