- type: entity
  parent: ClothingMaskBreathMedical
  id: ClothingMaskSecurityMedicalRespirator
  name: security medical respirator
  description: A respirator that provides protection against viruses, dust and more.
  components:
  - type: Sprite
    sprite: _WL/Clothing/Masks/securitymedicalrespirator.rsi
  - type: Clothing
    sprite: _WL/Clothing/Masks/securitymedicalrespirator.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95

- type: entity
  abstract: true
  parent: ClothingMaskBase
  id: ClothingMaskBalaclavBase
  name: balaclava
  description: Cool fiber mask.
  components:
  - type: Item
    storedRotation: -90
  - type: IdentityBlocker
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - FacialHair
    - HeadTop
    - HeadSide

