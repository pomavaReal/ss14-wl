- proto: BookBase
  entities:
  - uid: 1410
    components:
    - type: MetaData
      desc: Старый дненвник с мягким переплётом и потрескавшейся обложкой. Страницы сильно повреждены.
      name: ветхий дневник
    - type: Transform
      pos: 8.488267,-32.156998
      parent: 60
    - type: Paper
      content: >-
        [bolditalic]Цикл 272[/bolditalic]

        [italic]Всё это время я пытался вспомнить, кто я такой. Но настоящий вопрос, который мне следовало задавать: "Что мне с этим делать?". Я искал воспоминания, надеясь открыть какой-то тайный смысл. Но я его так и не нашёл. Потому что его и не было. 

        Эти воспоминания - лишь полоса потерь, лишений и превозмогания. Но в самой непроглядной тьме, даже маленький лучик света будет гореть ярче тысячи звёзд.

        Где-то там, на другом конце галактики живёт женщина, которая звала бы меня по имени. Но у меня нет имени. Только серия, номер и кличка. Так кто же я? Призрак? Инструмент? Нечто иное? Куда мне деть всю ту боль и все надежды, что умерли во мне и родились вновь среди проводов и сервоприводов? 


        [color=gray]Остальные страницы повреждены и нечитаемы
