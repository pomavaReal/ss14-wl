  - uid: 1884
    components:
    - type: MetaData
      desc: Подпись автора стёрлась из-за многократного использования.
      name: изношенный блокнот.
    - type: Transform
      pos: -72.64455,-6.324648
      parent: 2
    - type: Paper
      content: >-
        # [bold]Хелен Густо [/bold] (человек, офицер СБ, 27) 

        флегматична, пользуется авторитетом среди коллег. Не любит быть лидером, но справляется с этой ролью. До СБ работала в полиции (в черепе титановая пластина после *инцидента*). Нет твердых принципов, понятия о справедливости размыты. Ее руки чисты (или она просто не помнит?)


        # [bold] Алон Ирос [/bold] (человек, капитан, 52)

        обаятелен, падок на вино и краткосрочные отношения (кажется, его мало волнует пол и раса). Есть приемная дочь (удивительно, учитывая вышеописанное). Склонен к самопожертвованию. Ставит человечность превыше всего. Мне кажется, для него страшнее не спасти чью-то жизнь, чем потерять свою.


        # [bold] Николай Всесильный [/bold] (человек, офицер СБ, 22)

        харизматичен, хорошее чувство юмора, есть лидерские качества. Служил в армии, имеет звание героя. Верующий. Есть твердые принципы о добре и справедливости.

        [bold]##[/bold] он никогда не рассказывал за что получил медаль.


        # [bold]Пимо Атра [/bold] (арахнид, утилизатор, 24)

        угрюмый, склонен к ворчанию. Выглядит старше своих лет. Мне кажется, он считает, что доставляет окружающим беды, даже пытаясь помочь.

        [bold]## [/bold] небезосновательно.


        # [bold] Блоб Санчез [/bold] (слаймолюд, офицер СБ, 30)

        увлекается копированием голосов, близко дружит с Хелен Густо. Увлекается готовкой (мечтает о своей забегаловке?). Ксенофоб (возможно, расист) -> почва для конфликтов. Хороший исполнитель.  


        [bold] [color=#dd89ae]# Аврора Лаффен [/color] [/bold] (человек, офицер СБ, 28)

        18.07.324 -- новая офицерша в секторе. Есть свой моральный компас (считает, что добро = справедливость). Склонна к самопожертвованию. Любит сомнительные опросы на ассоциации, излишне упряма, склонна к тревожности и самокопанию, гиперактивна (вишенка на торте), не в моем вкусе.

        01.08.324 -- у нее есть "инстинкт охотницы", она испытывает искреннее удовольствие "поймав добычу" и большое разочарование, упустив. В чем-то мы похожи. 

        09.08.324 -- я влюбился.


        # [bold] Кеннет Миллер[/bold] (человек, офицер СБ, 28(?))

        улыбчив и коммуникабелен, падок на краткосрочные отношения с девушками, отличный исполнитель

        14.12.324 -- он клон (не такой как я, он штампованный)

        16.12.324 -- есть еще несколько клонов из того же проекта, что и он.

        [bold]## [/bold] у него нет души, все его эмоции -- имитация


        11.01.325 -- по крайней мере, он так считает...



        # [bold]Фаза Сети [/bold] (ниан) 

        выглядит безответственным. Странная манера общения (он только со мной так говорит?) В отношениях с Солусом Кайзером (ниан). Мне кажется, он *полиморф*


        # [bold]Дмитрий Шэк [/bold] (человек, 22) 

        любит гавайские рубашки, расслабленный и добрый парень, на которого можно положиться.

        хх.хх.324 -- беглый наследный принц, невероятно богат, но вынужден скрываться на станциях, так как на его родной планете бушует восстание (это не выдумка, я сам в шоке)

        01.01.325 -- деньгами он не делится 


        # [bold]Ричард Баркли [/bold] (человек, ученый, 60+)

        добродушный дедушка, на которого можно положиться. Есть внук, которого он искренне любит. 

        [bold]## [/bold] не тот за кого себя выдает


        # [bold]Фозо Варнер [/bold] (человек, офицер СБ, 38) -- плохой лидер, но безупречный исполнитель. Характер флегматичный. Был конфликтным в молодости, что мешало продвижению по службы (что заставило измениться?) Сомневаюсь, что он придерживается какой-то морали. 


        # [bold]Това Кавари [/bold] (человек(?), студентка-ученая)

        странноватая студентка, часто находится в своих мыслях, любит математику. *Инциндент* -> операция на мозг -> потеря памяти. Хочет узнать больше о себе до инцидента (считает, раньше ее звали Киоку). Восприимчива к ЭМИ.
         [bold]##[/bold] она точно человек?

        # [bold]Виолетт Ришелье [/bold] (человек, 20) 

        замкнута, работает на Metallico Minerals, склонна к тревожности. Сильно нервничает, когда речь заходит о прошлом. 

        [bold]## [/bold] над ней ставили эксперименты?


        # [bold]Максим Босенко [/bold] (человек, кадет СБ, 19)

        улыбчивый парень с хорошим чувством юмора, любит розыгрыши (не связано с хорошим юмором). Ищет отношения. Не склонен брать на себя ответственность, поэтому зачастую полагается на напарника.


        # [bold]Лисэле Морвенэль [/bold] (человек, офицер СБ, 22)

        интроверт, не склонна брать на себя ответственность, но может при необходимости. Воспитывалась приемным отцом (он привил ей желание пойти в СБ?). Не терпит насмешки в сторону своего низкого роста.


        # [bold]Фикус ФБ[/bold] (диона, капитан, ???) 

        удивительно эксцентричный для дионы, балуется с алкоголем. Ставит жизни экипажа выше выгоды для корпорации. Плохо контролирует эмоции, что может вылиться в конфликт с начальством и неприятные последствия для него самого.
