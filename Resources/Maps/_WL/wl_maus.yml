    - type: Paper
      content: >-
        Как же пользоваться атмос системой, почему и как она устроена.

        Данная система позволяет возвращать максимум газа, которого был впырскнуто в камеру.


        Поместите канистру на порт. Насос давления позволяет конкретно указать сколько же газа ввести. Фильтр рядом с ним фильтрует тот самый нужный газ из камеры в секцию наполнения канистры обратно. Там стоит насос объёма для А — сборса остатков газа в трубе, Б — нагнитания максимального давления в канистре итого.


        Важное примичание: выгоду эта схема принесёт лишь когда было впырскнуто много газа. Остаток распределится и потеряется в трубах наполнения канистры, как содержимое канистры, так и содержимое камеры, вследствии чего в трубах может быть больше, чем было затраченно изначально, но в канистру уже тот объём никак не закачаешь.
