- proto: BookBase
  entities:
  - uid: 9574
    components:
    - type: MetaData
      name: мемуары Колпачка
    - type: Transform
      rot: 3.141592653589793 rad
      pos: 47.94664,-39.428257
      parent: 2
    - type: Paper
      content: >2-
          Попал я на станцию прямо перед своим днём рождения.. должно быть весело, наверное, когда настанет полночь!
          Надо бы разнести приглашения. А! Их для начала нужно написать!

          Написал их.. шесть штучек. На большее меня не хватило, но остальных я лично позову.

          Раздал письма и позвал остальных, кому не досталось. Теперь надо подготовить место. Хочу красочно и ярко, как в детстве!

          Позвал инженеров помочь - помогли. Правда, наверное, скорее от нечего делать. Да и по пьяни... Фи.

          Всё подготовил, осталось дождаться народ!

          Уже полночь, а никто так и не пришёл... может, заблудились? Пойду встречу их у входа в тоннели!

          Их и там не оказалось. Должно быть, я никому не нужен был.. ну и катитесь отсюда, не надо мне вашей компании!
